<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .welcome-message{
        text-align: center;
        color: gray;
        padding-bottom: 10px;
      }

      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        align-items: start;
      }

      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        margin-left: 10px;
        margin-right: 10px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .loading-spinner-gif{
        height: 40px;
        margin: -15px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');

        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event){
          setInputText(event.target.value);
        }

        async function sendMessage(){

          if (!isLoading && inputText) {

            const newChatMessages = [
              ...chatMessages,
              {
                message: inputText,
                sender: 'user',
                id: crypto.randomUUID()
              }
            ]
            setChatMessages(newChatMessages);

            setInputText('');

            setChatMessages([
              ...newChatMessages,
              {
                message: <img className="loading-spinner-gif" src="loading-spinner.gif"/>,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ]);

            setIsLoading(true);

            const respone = await Chatbot.getResponseAsync(inputText);

            setChatMessages([
              ...newChatMessages,
              {
                message: respone,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ]);

            setIsLoading(false);
          } else{
            return;
          }

        }

        function pressKeyDown(event){
          if (event.key === 'Enter'){
            sendMessage();
          }

          if (event.key === 'Escape'){
            setInputText('');
          }
        }

        return (
          <div className="chat-input-container">
            <input 
              className="chat-input"
              placeholder="Send a message to Chatbot" 
              size="30" 
              onChange={saveInputText}
              value={inputText}
              onKeyDown={pressKeyDown}
            />
            <button
              onClick={sendMessage}
              className="send-button"
            >
              Send
            </button> 
          </div>
        );
      }

      function ChatMessage({message, sender}){
        //const message = props.message;
        //cosnt sender = sender.message;
        //const {sender, message} = props;
        /*
          if (sender === 'user'){
          return (
            <div>
              {message}
              <img width="50" src="user.png"/>
            </div>
          );
        } else {
            return (
              <div>
                <img width="50" src="robot.png"/>
                {message}
              </div>
            );
          }
        */
        
        return (
              <div className={
                sender === 'robot' 
                  ? 'chat-message-robot' 
                  : 'chat-message-user'
              }>
                {sender === 'robot' && (
                  <img className="chat-message-profile" 
                    src="robot.png"
                  />
                )}
                <div className="chat-message-text">
                  {message}
                </div>
                {sender ==='user' && (
                  <img className="chat-message-profile"
                    src="user.png"
                  />
                )}
              </div>
            );
        
      }

      function useAutoScroll(dependencies){
        const containerRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = containerRef.current;
          if (containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, dependencies);

        return containerRef;
      }

      function ChatMessages({chatMessages}){

        const chatMessagesRef = useAutoScroll([chatMessages]);

        return (
          <div className="chat-messages-container"
            ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      } 

      function WelcomeMessage({chatMessages}){
        return (
          <div className="welcome-message">
            {chatMessages.length === 0 ? 'Welcome to the chatbot project! Send a message using the textbox below.' : ''}
          </div>
        );
      }

      function App(){
        const [chatMessages, setChatMessages] = React.useState([]);
        // const [chatMessage, setChatMessage] = array;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];
        

        return (
          <div className="app-container">
            <ChatMessages 
              chatMessages={chatMessages}
            />

            <WelcomeMessage
              chatMessages={chatMessages}
            />

            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
