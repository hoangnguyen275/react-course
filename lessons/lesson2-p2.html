<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({productName, price, discountPrice, imageSrc}){
        return (
          <>
            <img src={imageSrc} width="50" />

            <p>{productName}</p>

            {discountPrice ? 
              (<del>Price: ${price}</del>) : 
              (<p>Price: ${price}</p>) 
            }
            
            {discountPrice ? (
              <p>
                Discount price: ${discountPrice}
              </p>
            ) : ``}

            <button>Add to Cart</button>

            <p></p>
          </>
        );
      }
      function App(){
        return (
          <>
            <ProductDetails 
              productName="Cotton socks"
              price="10.90"
              discountPrice="5.45" 
              imageSrc="cotton-socks.png"
            />

            <ProductDetails 
              productName="Tennis balls"
              price="6.00"
              imageSrc="tennis-balls.png"
            />

            <ProductDetails 
              productName="Plain T-shirt"
              price="7.99"
              discountPrice="10.31"
              imageSrc="plain-t-shirt.png"
            />
          </>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
